<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenChat</title>
    <link rel="icon" type="image/png" sizes="16x16" href="./img/favicon-16x16.png">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <!-- ===== Login screen ===== -->
    <div id="login" class="login-overlay">
        <form id="login-form" class="login-card" autocomplete="off">
            <div class="login-logo">💬</div>
            <h1 class="login-title">OpenChat</h1>
            <p class="login-subtitle">Pick a name to jump into the conversation.<br>No sign-up needed.</p>
            <input id="username" class="login-input" type="text" placeholder="Enter a username" maxlength="20" autocomplete="off" required>
            <button type="submit" class="login-button">Join chat</button>
            <p id="login-error" class="login-error"></p>
        </form>
    </div>

    <!-- ===== Chat screen ===== -->
    <div id="chat-page" class="chat-shell hidden">
        <header class="chat-header">
            <span class="chat-hash">#</span>
            <span class="chat-channel">open-chat</span>
            <span class="chat-topic">Say hi to everyone online</span>
        </header>

        <main id="chat" class="chat-messages">
            <div class="welcome">
                <div class="welcome-icon">#</div>
                <h2>Welcome to #open-chat</h2>
                <p>This is the start of the channel. Be nice. 👋</p>
            </div>
        </main>

        <footer class="chat-composer">
            <form id="message-form" class="composer-form">
                <textarea id="message" class="composer-input" rows="1"
                          placeholder="Message #open-chat" maxlength="1000"></textarea>
                <button type="submit" class="composer-send" aria-label="Send message">
                    <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M3 20.5v-6l8-2.5-8-2.5v-6l19 8.5z"/></svg>
                </button>
            </form>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.4.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="./js/script.js"></script>
</body>
</html>
